<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Null-Origin Sandbox Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020617; color: #e2e8f0; font-family: monospace; }
    header {
      padding: 16px 24px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    h1 { font-size: 14px; color: #94a3b8; font-weight: normal; }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 9999px;
      background: #7c3aed;
      color: #ede9fe;
    }
    .note {
      padding: 10px 24px;
      font-size: 12px;
      color: #475569;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
    }
    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 80px);
      border: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Null-Origin Sandbox Test</h1>
    <span class="badge">sandbox="allow-scripts"</span>
  </header>
  <div class="note">
    The iframe below has no <code>allow-same-origin</code> — its origin is null,
    matching the Cribl App Platform iframe environment.
    The smoke test inside should still pass.
  </div>
  <!--
    sandbox="allow-scripts" only — no allow-same-origin.
    window.origin inside the iframe will be "null".
  -->
  <iframe
    src="/"
    sandbox="allow-scripts"
    title="Pyodide smoke test under null-origin sandbox"
  ></iframe>
</body>
</html>
