# External domains the app reaches via fetch(). Declared for install-time review and pack proxy routing.
# Pyodide loads extra wheels from the official jsDelivr full distribution (see src/pyodide/pyodideVersion.ts).
# micropip installs wheels from PyPI (simple index + file storage).
# jsDelivr path version must match PYODIDE_RELEASE (enforced by src/notebook/proxiesConfig.test.ts).

cdn.jsdelivr.net:
  paths:
    allowlist:
      - /pyodide/v0.29.3/

pypi.org:
  paths:
    allowlist:
      - /simple/
      - /pypi/

files.pythonhosted.org:
  paths:
    allowlist:
      - /packages/

ai.cribl.cloud:
  paths:
    allowlist:
      - /v1/translate/kql
      - /v1/translate
      - /translate

ai.cribl-staging.cloud:
  paths:
    allowlist:
      - /v1/translate/kql
      - /v1/translate
      - /translate
