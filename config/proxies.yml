# External domains the app reaches via fetch(). Declared for install-time review and pack proxy routing.
# Pyodide loads extra wheels from the official jsDelivr full distribution (see src/pyodide/pyodideVersion.ts).
# micropip installs wheels from PyPI (simple index + file storage).
# jsDelivr path version must match PYODIDE_RELEASE (enforced by src/notebook/proxiesConfig.test.ts).

cdn.jsdelivr.net:
  paths:
    allowlist:
      - /pyodide/v0.29.3/

pypi.org:
  paths:
    allowlist:
      - /simple/
      - /pypi/

files.pythonhosted.org:
  paths:
    allowlist:
      - /packages/

# Composio REST API (example notebook: composio-client over HTTPS through pack proxy).
# Auth is supplied from notebook placeholders at runtime — no headers.inject here.
# composio-client 1.39.x calls paths under /api/v3.1/ (e.g. toolkits list, tools list, tools execute).
backend.composio.dev:
  paths:
    allowlist:
      - /api/v3.1/toolkits
      - /api/v3.1/tools

