# Advisory secret scan on pull requests (OSS gitleaks CLI — no org license).
# Does not block merges. For enforcement, enable GitHub Secret scanning + Push
# protection under Settings → Code security and analysis.

name: Secret scan

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: v8.24.2
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_8.24.2_linux_x64.tar.gz" \
            | tar -xz
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Scan PR commits
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --verbose
