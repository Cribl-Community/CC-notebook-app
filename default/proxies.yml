# External domains the app reaches via fetch(). Declared for install-time review and pack proxy routing.
# Pyodide loads extra wheels from the official jsDelivr full distribution (see src/pyodide/pyodideVersion.ts).
# micropip installs wheels from PyPI (simple index + file storage).
# jsDelivr path version must match PYODIDE_RELEASE (enforced by src/notebook/proxiesConfig.test.ts).

cdn.jsdelivr.net:
  paths:
    allowlist:
      - /pyodide/v0.29.3/

pypi.org:
  paths:
    allowlist:
      - /simple/
      - /pypi/

files.pythonhosted.org:
  paths:
    allowlist:
      - /packages/

# Composio REST API — used by the Composio_Python_SDK example notebook.
# The Pyodide kernel bridge strips all custom headers, so x-api-key cannot be sent by Python
# code directly. The proxy injects it from the app's KV store (key: composioApiKey).
# composio-client 1.39.0 calls paths under /api/v3.1/ (confirmed by inspecting the wheel).
backend.composio.dev:
  paths:
    allowlist:
      - /api/v3.1/
  headers:
    inject:
      x-api-key: kv.composioApiKey

